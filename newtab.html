<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>书签主页</title>
  <link rel="stylesheet" href="styles/theme.css">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="app">
    <header class="masthead">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">◆</span>
        <span class="brand-name">书签主页</span>
      </div>
      <div id="readout" class="readout" aria-live="polite"></div>
      <div class="masthead-actions">
        <button id="add-bookmark" class="icon-btn" title="新增书签">+</button>
        <button id="open-stats" class="icon-btn" title="使用统计" aria-label="使用统计">
          <svg viewBox="0 0 24 24" width="17" height="17" aria-hidden="true">
            <rect x="3" y="12" width="4" height="8" rx="1" fill="currentColor"/>
            <rect x="10" y="7" width="4" height="13" rx="1" fill="currentColor"/>
            <rect x="17" y="3" width="4" height="17" rx="1" fill="currentColor"/>
          </svg>
        </button>
        <button id="toggle-sort" class="icon-btn" title="自动排序开关">⇅</button>
        <button id="open-settings" class="icon-btn" title="设置">⚙</button>
      </div>
    </header>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
        <path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/>
      </svg>
      <input id="search" type="text" placeholder="搜索书签,输入即匹配" autocomplete="off" spellcheck="false" />
      <kbd id="search-hint" class="search-hint">/</kbd>
      <button id="search-clear" class="search-clear" title="清空 (Esc)" aria-label="清空" hidden>&times;</button>
    </div>

    <nav id="tabbar" class="tabbar" aria-label="书签分组"></nav>

    <main id="content" class="content"></main>

    <div id="search-results" class="search-results" hidden></div>
  </div>

  <div id="add-panel" class="add-panel" hidden>
    <form class="add-card" id="add-form">
      <div class="settings-head">
        <h2>新增书签</h2>
        <button type="button" id="close-add" class="icon-btn" title="关闭">&times;</button>
      </div>
      <label class="add-field">
        <span>网址</span>
        <input id="add-url" type="url" placeholder="https://..." autocomplete="off" required />
      </label>
      <label class="add-field">
        <span>标题(选填)</span>
        <input id="add-title" type="text" placeholder="留空使用页面标题" autocomplete="off" />
      </label>
      <label class="add-field">
        <span>收藏到</span>
        <select id="add-folder"></select>
      </label>
      <div class="add-actions">
        <button type="button" id="cancel-add" class="text-btn">取消</button>
        <button type="submit" class="text-btn primary">保存</button>
      </div>
    </form>
  </div>

  <div id="settings-panel" class="settings-panel" hidden>
    <div class="settings-card">
      <div class="settings-head">
        <h2>设置</h2>
        <button id="close-settings" class="icon-btn" title="关闭">&times;</button>
      </div>
      <label class="setting-row">
        <span>
          按使用频率自动排序
          <span class="setting-sub">常用的分组和书签自动往前排</span>
        </span>
        <input id="set-autosort" type="checkbox" class="switch" />
      </label>
      <label class="setting-row">
        <span>
          在新标签页打开链接
          <span class="setting-sub">关闭则在当前页跳转</span>
        </span>
        <input id="set-newtab" type="checkbox" class="switch" />
      </label>
      <div class="setting-row setting-row-stack">
        <span>
          页面宽度
          <span class="setting-sub">向右拉变宽,每行书签自动变多</span>
        </span>
        <div class="width-control">
          <input id="set-width" type="range" class="slider" min="1000" max="2600" step="100" />
          <output id="width-readout" class="width-readout"></output>
        </div>
      </div>
      <div class="setting-row">
        <span>
          使用统计
          <span class="setting-sub">清空后重新开始累计点击</span>
        </span>
        <button id="clear-stats" class="text-btn">清空</button>
      </div>
    </div>
  </div>

  <div id="stats-panel" class="stats-panel" hidden>
    <div class="stats-card">
      <div class="settings-head">
        <h2>使用统计</h2>
        <button id="close-stats" class="icon-btn" title="关闭">&times;</button>
      </div>
      <div id="stats-summary" class="stats-summary"></div>
      <div id="stats-top" class="stats-section"></div>
      <div id="stats-recent" class="stats-section"></div>
    </div>
  </div>

  <div id="palette" class="palette" hidden>
    <div class="palette-card">
      <div class="palette-input-wrap">
        <svg class="palette-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/>
        </svg>
        <input id="palette-input" type="text" placeholder="搜索书签,或输入 > 执行命令" autocomplete="off" spellcheck="false" />
      </div>
      <div id="palette-results" class="palette-results"></div>
      <div class="palette-footer">
        <span><kbd>↑</kbd><kbd>↓</kbd> 选择</span>
        <span><kbd>↵</kbd> 打开</span>
        <span><kbd>esc</kbd> 关闭</span>
        <span class="palette-footer-tip"><kbd>&gt;</kbd> 命令</span>
      </div>
    </div>
  </div>

  <script src="src/storage.js"></script>
  <script src="src/favicon.js"></script>
  <script src="src/usage.js"></script>
  <script src="src/bookmarks.js"></script>
  <script src="src/search.js"></script>
  <script src="src/render.js"></script>
  <script src="src/settings.js"></script>
  <script src="src/stats.js"></script>
  <script src="src/palette.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
